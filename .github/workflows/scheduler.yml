name: Scheduler
on:
  workflow_dispatch:
  workflow_call:
    secrets:
      WORKFLOW_PUSH_TOKEN:
        required: true

jobs:
  reprogram-messenger:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.WORKFLOW_PUSH_TOKEN }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Scheduler
        run: python Scheduler.py
      - name: Commit Update
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/messenger.yml
          git commit -m "Scheduler: Rescheduled messenger for next gameweek" || exit 0
          git push
